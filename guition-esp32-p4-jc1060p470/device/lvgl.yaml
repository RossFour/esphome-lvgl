        # Color: Spring Green
        - button:
            height: $button_height
            width: $button_width
            styles: control
            bg_color: 0x00FF7F
            widgets:
              - label:
                  align: bottom_left
                  text: "Spring"
                  text_color: 0x000000
            on_click:
              - if:
