            height: $button_height
            width: $button_width
            styles: control
            bg_color: 0xFF4500
            widgets:
              - label:
                  align: bottom_left
                  text: "OrangeRed"
            on_click:
              - if:
                  condition:
                    lambda: 'return !id(is_swiping);'
                  then:
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.office_light
                          color_name: orangered
                    - homeassistant.service:
