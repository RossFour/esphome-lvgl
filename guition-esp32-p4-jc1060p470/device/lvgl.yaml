        - lvgl.widget.update:
            id: dot_home
            bg_color: 0x666666

      widgets:

        # Office Overhead Light
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_overheaad_lamp_button
            styles: control
            widgets:
