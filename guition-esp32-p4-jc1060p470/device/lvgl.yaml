    # ============================================================
    # PAGE 3: ENERGY & LAUNDRY
    # Solar, grid power, washer, dryer
    # ============================================================
    - id: home_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_swipe_left:
        - script.execute: set_swiping
        - lvgl.page.next:
        - lvgl.widget.update:
            id: dot_office
            bg_color: 0xFF8C00
        - lvgl.widget.update:
            id: dot_climate
            bg_color: 0x666666
        - lvgl.widget.update:
            id: dot_home
            bg_color: 0x666666
      on_swipe_right:
        - script.execute: set_swiping
        - lvgl.page.previous:
        - lvgl.widget.update:
            id: dot_office
            bg_color: 0x666666
        - lvgl.widget.update:
            id: dot_climate
            bg_color: 0xFF8C00
        - lvgl.widget.update:
            id: dot_home
            bg_color: 0x666666

      widgets:

        # Solar Power Display
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: solar_button
            styles: control
            widgets:
              - obj:
                  align: top_left
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: solar_power_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "W"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Solar"
            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: solar_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(solar_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: switch.toggle
                        data:
                          entity_id: switch.inverter_53600dsn198w0085_switch

        # Power Consumed Display
        - button:
            height: $button_height
            width: $button_width
            styles: control
            widgets:
              - obj:
                  align: top_left
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: power_consumed_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "W"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Grid Power"

        # Power Produced Display
        - button:
            height: $button_height
            width: $button_width
            styles: control
            widgets:
              - obj:
                  align: top_left
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: power_produced_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "W"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Produced"

        # Washer
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: washer_button
            styles: control
            widgets:
              # Icon (shown when idle)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: washer_icon
                  text: $washing_machine
              # Power (shown when active)
              - obj:
                  align: top_left
                  id: washer_power_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: washer_power_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "W"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Washer"

        # Dryer
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: dryer_button
            styles: control
            widgets:
              # Icon (shown when idle)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: dryer_icon
                  text: $tumble_dryer
              # Power (shown when active)
              - obj:
                  align: top_left
                  id: dryer_power_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: dryer_power_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "W"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Dryer"
