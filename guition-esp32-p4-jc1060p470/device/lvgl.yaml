globals:
  - id: is_swiping
    type: bool
    restore_value: false
    initial_value: 'false'

script:
  - id: set_swiping
    mode: restart
    then:
      - globals.set:
          id: is_swiping
          value: 'true'
      - delay: 500ms
      - globals.set:
          id: is_swiping
          value: 'false'

lvgl:
  displays: my_display
  byte_order: little_endian
  page_wrap: true

  top_layer:
    widgets:

      # Temperature
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # Page indicator dots
      - obj:
          align: top_right
          x: -8
          y: 6
          height: SIZE_CONTENT
          width: SIZE_CONTENT
          bg_opa: TRANSP
          border_width: 0
          pad_all: 0
          layout:
            type: flex
            flex_flow: row
            pad_column: 6
          widgets:
            - obj:
                id: dot_office
                width: 10
                height: 10
                radius: 5
                bg_color: 0xFF8C00
                border_width: 0
                pad_all: 0
                on_click:
                  - lvgl.page.show: office_page
                  - lvgl.widget.update:
                      id: dot_office
                      bg_color: 0xFF8C00
                  - lvgl.widget.update:
                      id: dot_climate
                      bg_color: 0x666666
                  - lvgl.widget.update:
                      id: dot_home
                      bg_color: 0x666666
            - obj:
                id: dot_climate
                width: 10
                height: 10
                radius: 5
                bg_color: 0x666666
                border_width: 0
                pad_all: 0
                on_click:
                  - lvgl.page.show: climate_page
                  - lvgl.widget.update:
                      id: dot_office
                      bg_color: 0x666666
                  - lvgl.widget.update:
                      id: dot_climate
                      bg_color: 0xFF8C00
                  - lvgl.widget.update:
                      id: dot_home
                      bg_color: 0x666666
            - obj:
                id: dot_home
                width: 10
                height: 10
                radius: 5
                bg_color: 0x666666
                border_width: 0
                pad_all: 0
                on_click:
                  - lvgl.page.show: home_page
                  - lvgl.widget.update:
                      id: dot_office
                      bg_color: 0x666666
                  - lvgl.widget.update:
                      id: dot_climate
                      bg_color: 0x666666
                  - lvgl.widget.update:
                      id: dot_home
                      bg_color: 0xFF8C00

  on_idle:
    - timeout: 120s
      then:
        - switch.turn_off: backlight
        - lvgl.pause:
            show_snow: true

  pages:

    # ============================================================
    # PAGE 1: OFFICE
    # Lights, thermostat, radiator, aircon, blinds
    # ============================================================
    - id: office_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      on_swipe_left:
        - script.execute: set_swiping
        - lvgl.page.next:
        - lvgl.widget.update:
            id: dot_office
            bg_color: 0x666666
        - lvgl.widget.update:
            id: dot_climate
            bg_color: 0xFF8C00
        - lvgl.widget.update:
            id: dot_home
            bg_color: 0x666666
      on_swipe_right:
        - script.execute: set_swiping
        - lvgl.page.previous:
        - lvgl.widget.update:
            id: dot_office
            bg_color: 0x666666
        - lvgl.widget.update:
            id: dot_climate
            bg_color: 0x666666
        - lvgl.widget.update:
            id: dot_home
            bg_color: 0xFF8C00

      widgets:

        # All Office Lights (Warm White)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: all_lights_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "All Lights"
            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: all_lights_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(all_lights_button), LV_STATE_CHECKED);'
                  else:
                    - if:
                        condition:
                          lambda: 'return lv_obj_has_state(id(all_lights_button), LV_STATE_CHECKED);'
                        then:
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.office_light
                                color_temp_kelvin: "2700"
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.antela_9w_rgb_cct
                                color_temp_kelvin: "2700"
                          - homeassistant.service:
                              service: light.turn_on
                              data:
                                entity_id: light.office_shelf
                                color_temp_kelvin: "2700"
                        else:
                          - homeassistant.service:
                              service: light.turn_off
                              data:
                                entity_id: light.office_light
                          - homeassistant.service:
                              service: light.turn_off
                              data:
                                entity_id: light.antela_9w_rgb_cct
                          - homeassistant.service:
                              service: light.turn_off
                              data:
                                entity_id: light.office_shelf

        # Thermostat Display
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: thermostat_button
            styles: control
            widgets:
              - obj:
                  align: top_left
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: thermostat_current_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "°C"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Thermostat"
            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: thermostat_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(thermostat_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: climate.toggle
                        data:
                          entity_id: climate.dining_room

        # Thermostat Up
        - button:
            height: $button_height
            width: $button_width
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  text: $chevron_up
              - label:
                  align: bottom_left
                  text: "Temp Up"
            on_click:
              - if:
                  condition:
                    lambda: 'return !id(is_swiping);'
                  then:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.dining_room
                          temperature: !lambda |-
                            return id(thermostat_target).state + 0.5;

        # Thermostat Down
        - button:
            height: $button_height
            width: $button_width
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  text: $chevron_down
              - label:
                  align: bottom_left
                  text: "Temp Down"
            on_click:
              - if:
                  condition:
                    lambda: 'return !id(is_swiping);'
                  then:
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.dining_room
                          temperature: !lambda |-
                            return id(thermostat_target).state - 0.5;

        # Office Radiator
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_radiator_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $radiator
              - label:
                  align: bottom_left
                  text: "Office Rad"
            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: office_radiator_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(office_radiator_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: climate.toggle
                        data:
                          entity_id: climate.office_radiator

        # Penthouse Radiator
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: penthouse_radiator_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $radiator
              - label:
                  align: bottom_left
                  text: "Penthouse Rad"
            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: penthouse_radiator_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(penthouse_radiator_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: climate.toggle
                        data:
                          entity_id: climate.penthouse_radiator

        # Penthouse Lights
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: penthouse_lights_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $outdoor_lamp
              - label:
                  align: bottom_left
                  text: "Penthouse"
            on_click:
