            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: office_shelf_lamp_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(office_shelf_lamp_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: light.office_shelf

        # Brightness Slider (all office lights)
        - obj:
            height: $button_height
            width: $button_width
            bg_color: $button_control_color
            radius: $radius
            pad_all: $padding
            border_width: 0
            widgets:
              - slider:
                  id: brightness_slider
                  align: center
                  width: 170
                  height: 30
                  min_value: 0
                  max_value: 255
                  value: 128
                  bg_color: 0x000000
                  bg_grad_color: 0xFFFFFF
                  bg_grad_dir: HOR
                  border_width: 0
                  radius: 4
                  indicator:
                    bg_opa: TRANSP
                  knob:
                    radius: 2
                    width: 6
                    height: 34
                    bg_color: 0xFFFFFF
                    border_width: 0
                  on_value:
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.office_light
                          brightness: !lambda return (int)x;
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.antela_9w_rgb_cct
                          brightness: !lambda return (int)x;
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.office_shelf
                          brightness: !lambda return (int)x;
              - label:
                  align: bottom_left
                  text_font: label_font
                  text_color: $button_text_color
                  text: "Brightness"

        # White: Warm (2700K)
        - button:
            height: $button_height
            width: $button_width
            styles: control
            bg_color: 0xFFB347
            widgets:
              - label:
                  align: bottom_left
