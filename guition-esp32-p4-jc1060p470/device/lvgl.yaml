                          color_name: orangered
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.office_shelf
                          color_name: orangered

        # Color: Gold
        - button:
            height: $button_height
            width: $button_width
            styles: control
            bg_color: 0xFFD700
            widgets:
              - label:
                  align: bottom_left
                  text: "Gold"
                  text_color: 0x000000
            on_click:
              - if:
                  condition:
