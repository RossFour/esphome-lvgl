                        data:
                          entity_id: light.antela_9w_rgb_cct
                          color_temp_kelvin: "4000"
                    - homeassistant.service:
                        service: light.turn_on
                        data:
                          entity_id: light.office_shelf
                          color_temp_kelvin: "4000"

