            on_click:
              - if:
                  condition:
                    lambda: 'return id(is_swiping);'
                  then:
                    - lvgl.widget.update:
                        id: office_desk_lamp_button
                        state:
                          checked: !lambda 'return !lv_obj_has_state(id(office_desk_lamp_button), LV_STATE_CHECKED);'
                  else:
                    - homeassistant.service:
                        service: light.toggle
                        data:
                          entity_id: light.antela_9w_rgb_cct

        # Office Shelf Light
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_shelf_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_shelf_lamp_icon
                  text: $spot_light
              - label:
                  align: bottom_left
                  id: office_shelf_lamp_label
