sensor:

  # Temperature (keep)
  - platform: homeassistant
    entity_id: sensor.office_radiator_local_temperature
    id: office_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(id(outdoor_temperature).state)', '(int)round(x)' ]

  - platform: homeassistant
    entity_id: sensor.temperature
    id: outdoor_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(x)', '(int)round(id(office_temperature).state)' ]

  # Thermostat Current Temperature
  - platform: homeassistant
    entity_id: sensor.dining_room_temperature
    id: thermostat_current
    on_value:
      - lvgl.label.update:
          id: thermostat_current_label
          text:
            format: "%.1f"
            args: [ 'x' ]

  # Thermostat Target Temperature
  - platform: homeassistant
    entity_id: sensor.target_temp
    id: thermostat_target

  # Solar Inverter Power
  - platform: homeassistant
    entity_id: sensor.inverter_inverted
    id: solar_inverted
    on_value:
      - lvgl.label.update:
          id: solar_power_label
          text:
            format: "%.0f"
            args: [ 'x' ]
      - lvgl.widget.update:
          id: solar_button
          state:
            checked: !lambda return x > 0;

  # Power Consumed
  - platform: homeassistant
    entity_id: sensor.power_consumed
    id: power_consumed
    on_value:
      - lvgl.label.update:
          id: power_consumed_label
          text:
            format: "%.0f"
            args: [ 'x' ]

  # Power Produced
  - platform: homeassistant
    entity_id: sensor.power_produced
    id: power_produced
    on_value:
      - lvgl.label.update:
          id: power_produced_label
          text:
            format: "%.0f"
            args: [ 'x' ]

  # Washer Power
  - platform: homeassistant
    entity_id: sensor.laundry_washer_power
    id: washer_power
    on_value:
      - lvgl.label.update:
          id: washer_power_label
          text:
            format: "%.0f"
            args: [ 'x' ]
      - lvgl.widget.update:
          id: washer_icon
          hidden: !lambda return x > 5;
      - lvgl.widget.update:
          id: washer_power_container
          hidden: !lambda return x <= 5;
      - lvgl.widget.update:
          id: washer_button
          state:
            checked: !lambda return x > 5;

  # Dryer Power
  - platform: homeassistant
    entity_id: sensor.laundry_dryer_power
    id: dryer_power
    on_value:
      - lvgl.label.update:
          id: dryer_power_label
          text:
            format: "%.0f"
            args: [ 'x' ]
      - lvgl.widget.update:
          id: dryer_icon
          hidden: !lambda return x > 5;
      - lvgl.widget.update:
          id: dryer_power_container
          hidden: !lambda return x <= 5;
      - lvgl.widget.update:
          id: dryer_button
          state:
            checked: !lambda return x > 5;


binary_sensor:

  # ============================================================
  # PAGE 1: OFFICE
  # ============================================================

  # Office Lights (keep)
  - platform: homeassistant
    id: office_overheaad_lamp
    entity_id: light.office_light
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_overheaad_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: office_desk_lamp
    entity_id: light.antela_9w_rgb_cct
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_desk_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: office_shelf_lamp
    entity_id: light.office_shelf
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_shelf_lamp_button
          state:
            checked: !lambda return x;

  # Thermostat (heating state)
  - platform: homeassistant
    id: thermostat_heating
    entity_id: climate.dining_room
    attribute: hvac_action
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: thermostat_button
          state:
            checked: !lambda return x;

  # Office Radiator
  - platform: homeassistant
    id: office_radiator_state
    entity_id: climate.office_radiator
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: office_radiator_button
          state:
            checked: !lambda return x;

  # Penthouse Radiator
  - platform: homeassistant
    id: penthouse_radiator_state
    entity_id: climate.penthouse_radiator
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: penthouse_radiator_button
          state:
            checked: !lambda return x;

  # Penthouse Lights
  - platform: homeassistant
    id: penthouse_lights_state
    entity_id: light.penthouse_lights
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: penthouse_lights_button
          state:
            checked: !lambda return x;

  # All Lights (synced from office overhead)
  - platform: homeassistant
    id: all_lights_state
    entity_id: light.office_light
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: all_lights_button
          state:
            checked: !lambda return x;
