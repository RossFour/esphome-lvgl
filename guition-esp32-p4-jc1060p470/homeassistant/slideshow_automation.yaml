# Home Assistant Automation: Slideshow Photo Rotation
# ---------------------------------------------------------
# Place photos (jpg/png) in /config/www/photos/
# This automation picks a random one every 60 seconds,
# resizes it to 1060x470 PNG, and saves it for the ESP to download.
#
# Uses Pillow (PIL) which ships with Home Assistant — no extra
# add-ons or HACS integrations needed.
#
# Prerequisites:
#   1. Create the directories:
#        mkdir -p /config/www/photos /config/www/slideshow
#   2. Add your photos to /config/www/photos/
#   3. Add the shell_command below to your configuration.yaml
#   4. Create the Python script at /config/scripts/rotate_slideshow.py
#   5. Add the automation below via the HA UI or automations.yaml
# ---------------------------------------------------------

# --- Add to configuration.yaml ---
#
# shell_command:
#   rotate_slideshow_photo: "python3 /config/scripts/rotate_slideshow.py"

# --- Create /config/scripts/rotate_slideshow.py ---
# (see rotate_slideshow.py in this directory)

# --- Add to automations.yaml (or create via UI) ---

alias: "Slideshow - Rotate Photo"
description: "Picks a random photo and resizes it for the ESPHome display screensaver"
mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

condition:
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
    after: "08:59:00"
    before: "18:01:00"

action:
  - service: shell_command.rotate_slideshow_photo
