substitutions:
  icon_font: icon_font
  button_on_color: "0xFF8C00"
  button_text_color: "0xFFFFFF"
  button_control_color: "0x313131"
  button_height: 130px
  button_width: 200px
  padding: 14px
  radius: 8px

lvgl:
  style_definitions:
    - id: control
      bg_color: $button_control_color
    - id: indicator
      bg_color: 0x1A1A1A
      border_width: 1
      border_color: 0x444444
      text_color: 0x999999

  theme:
    button:
      text_font: label_font
      scroll_on_focus: false
      gesture_bubble: true
      radius: $radius
      width: $button_width
      height: $button_height
      pad_all: $padding
      shadow_width: 0
      text_color: $button_text_color
      checked:
        bg_color: $button_on_color
        text_color: $button_text_color
